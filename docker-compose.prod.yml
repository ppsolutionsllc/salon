services:
  db:
    ports: !override []

  redis:
    ports: !override []

  api:
    command:
      [
        "sh",
        "-lc",
        "python scripts/wait_for_services.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips='*'",
      ]
    volumes: !override
      - uploads_data:/var/app/uploads
      - ./.deploy:/var/app/deploy:ro
    ports: !override []
    environment:
      - ENVIRONMENT=production
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required in production}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://aestheticsprime.beauty}
      - TRUSTED_HOSTS=${TRUSTED_HOSTS:-aestheticsprime.beauty,localhost,127.0.0.1,api}
      - SITE_EDITOR_OPERATOR_WRITE=${SITE_EDITOR_OPERATOR_WRITE:-false}
      - WAIT_FOR_SERVICES_RETRIES=${WAIT_FOR_SERVICES_RETRIES:-40}
      - WAIT_FOR_SERVICES_DELAY=${WAIT_FOR_SERVICES_DELAY:-2}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/health').getcode()==200 else 1)",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  worker:
    command:
      [
        "sh",
        "-lc",
        "python scripts/wait_for_services.py && celery -A app.worker.celery_app worker --beat --loglevel=info",
      ]
    volumes: !override
      - uploads_data:/var/app/uploads
    environment:
      - ENVIRONMENT=production
      - CORS_ORIGINS=${CORS_ORIGINS:-https://aestheticsprime.beauty}
      - TRUSTED_HOSTS=${TRUSTED_HOSTS:-aestheticsprime.beauty,localhost,127.0.0.1,api}
      - SITE_EDITOR_OPERATOR_WRITE=${SITE_EDITOR_OPERATOR_WRITE:-false}
      - WAIT_FOR_SERVICES_RETRIES=${WAIT_FOR_SERVICES_RETRIES:-40}
      - WAIT_FOR_SERVICES_DELAY=${WAIT_FOR_SERVICES_DELAY:-2}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: runner
    command: node server.js
    volumes: !override []
    ports: !override
      - "${WEB_EXTERNAL_PORT:-8080}:3000"
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - PORT=3000
      - API_INTERNAL_URL=${API_INTERNAL_URL:-http://api:8000}
      - INTERNAL_API_URL=${INTERNAL_API_URL:-http://api:8000}
      - API_PUBLIC_URL=${API_PUBLIC_URL:-https://aestheticsprime.beauty/api}
      - NEXT_PUBLIC_API_URL=/api
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-https://aestheticsprime.beauty}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-https://aestheticsprime.beauty}
      - AUTH_URL=${AUTH_URL:?AUTH_URL is required in production}
      - AUTH_SECRET=${AUTH_SECRET:?AUTH_SECRET is required in production}
      - AUTH_TRUST_HOST=${AUTH_TRUST_HOST:-true}
      - NEXT_PUBLIC_SITE_EDITOR_OPERATOR_WRITE=${NEXT_PUBLIC_SITE_EDITOR_OPERATOR_WRITE:-false}
      - NEXTAUTH_URL=${NEXTAUTH_URL:?NEXTAUTH_URL is required for compatibility}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required for compatibility}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 20s
    depends_on:
      api:
        condition: service_healthy

  nginx:
    profiles: ["with-internal-nginx"]
