services:
  api:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes: !override
      - uploads_data:/var/app/uploads
      - ./.deploy:/var/app/deploy:ro
    environment:
      - ENVIRONMENT=production
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required in production}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/health').getcode()==200 else 1)",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  worker:
    command: celery -A app.worker.celery_app worker --beat --loglevel=info
    volumes: !override
      - uploads_data:/var/app/uploads
    environment:
      - ENVIRONMENT=production

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: runner
    command: node server.js
    volumes: !override []
    environment:
      - NODE_ENV=production
      - NEXTAUTH_URL=${NEXTAUTH_URL:?NEXTAUTH_URL is required in production}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required in production}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 20s
      timeout: 8s
      retries: 10
      start_period: 30s

  nginx:
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
